<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地词性标注系统</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --primary: #3b82f6;
        --primary-dark: #1d4ed8;
        --muted: #64748b;
        --border: #dbe3ef;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef4ff, var(--bg));
        color: #0f172a;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero {
        padding: 28px;
        border-radius: 24px;
        background: linear-gradient(120deg, #1d4ed8, #3b82f6 60%, #60a5fa);
        color: white;
        box-shadow: 0 18px 40px rgba(29, 78, 216, 0.25);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 22px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
      }
      h1, h2, h3 { margin-top: 0; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
      button {
        border: none; border-radius: 999px; padding: 10px 16px; cursor: pointer;
        background: var(--primary); color: white; font-weight: 600;
      }
      button.secondary { background: #e2e8f0; color: #0f172a; }
      button:hover { background: var(--primary-dark); }
      textarea, input, select {
        width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 12px;
        font: inherit; margin-top: 8px; background: #f8fafc;
      }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
      .tag {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: 48px; padding: 6px 10px; border-radius: 999px; font-size: 12px;
        color: white; font-weight: 700;
      }
      .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .metric {
        border-radius: 16px; padding: 16px; background: #eff6ff; border: 1px solid #bfdbfe;
      }
      .metric strong { display: block; font-size: 28px; margin-top: 8px; }
      .muted { color: var(--muted); }
      .bars { display: grid; gap: 10px; margin-top: 14px; }
      .bar-row { display: grid; grid-template-columns: 72px 1fr 48px; align-items: center; gap: 10px; }
      .bar-track { height: 12px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
      .bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); }
      pre {
        background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 16px;
        overflow: auto; font-size: 12px;
      }
      @media (max-width: 720px) { .stats { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1>基于结构化平均感知机的中英文词性标注系统</h1>
        <p>本地训练、本地推理、本地可视化。支持 CoNLL 数据训练、在线预测、标签分布展示与混淆矩阵查看。</p>
        <div class="actions">
          <button id="trainBtn">训练默认模型</button>
          <button class="secondary" id="loadStatsBtn">刷新统计</button>
        </div>
      </section>

      <div class="grid">
        <section class="card">
          <h2>在线预测</h2>
          <label>
            输入文本
            <textarea id="inputText" rows="5">The student studies NLP carefully</textarea>
          </label>
          <label>
            分词策略
            <select id="tokenizer">
              <option value="auto">自动</option>
              <option value="whitespace">空格切分</option>
              <option value="char">逐字切分</option>
            </select>
          </label>
          <div class="actions">
            <button id="predictBtn">开始标注</button>
          </div>
          <table>
            <thead>
              <tr><th>词</th><th>词性</th></tr>
            </thead>
            <tbody id="predictionBody">
              <tr><td colspan="2" class="muted">请先训练模型后再预测。</td></tr>
            </tbody>
          </table>
        </section>

        <section class="card">
          <h2>训练统计</h2>
          <div class="stats">
            <div class="metric"><span class="muted">验证集准确率</span><strong id="validAcc">--</strong></div>
            <div class="metric"><span class="muted">测试集准确率</span><strong id="testAcc">--</strong></div>
            <div class="metric"><span class="muted">基线准确率</span><strong id="baselineAcc">--</strong></div>
            <div class="metric"><span class="muted">词表大小</span><strong id="vocabSize">--</strong></div>
          </div>
          <h3 style="margin-top: 20px;">词性分布</h3>
          <div id="distribution" class="bars"></div>
        </section>
      </div>

      <section class="card" style="margin-top: 20px;">
        <h2>混淆矩阵</h2>
        <pre id="confusion">等待训练结果...</pre>
      </section>
    </div>

    <script>
      const palette = ["#2563eb", "#8b5cf6", "#0891b2", "#059669", "#ea580c", "#dc2626", "#7c3aed"];
      const tagColor = (tag) => {
        let sum = 0;
        for (const ch of tag) sum += ch.charCodeAt(0);
        return palette[sum % palette.length];
      };

      async function callApi(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || "请求失败");
        }
        return payload;
      }

      function renderPrediction(tokens) {
        const body = document.getElementById("predictionBody");
        if (!tokens.length) {
          body.innerHTML = '<tr><td colspan="2" class="muted">暂无结果。</td></tr>';
          return;
        }
        body.innerHTML = tokens.map(({ word, tag }) => `
          <tr>
            <td>${word}</td>
            <td><span class="tag" style="background:${tagColor(tag)}">${tag}</span></td>
          </tr>
        `).join("");
      }

      function renderDistribution(distribution) {
        const container = document.getElementById("distribution");
        const entries = Object.entries(distribution || {});
        if (!entries.length) {
          container.innerHTML = '<div class="muted">暂无统计。</div>';
          return;
        }
        const maxValue = Math.max(...entries.map(([, value]) => value));
        container.innerHTML = entries.map(([tag, value]) => `
          <div class="bar-row">
            <strong>${tag}</strong>
            <div class="bar-track"><div class="bar-fill" style="width:${(value / maxValue) * 100}%"></div></div>
            <span>${value}</span>
          </div>
        `).join("");
      }

      function renderStats(stats) {
        document.getElementById("validAcc").textContent = `${(stats.valid_accuracy * 100).toFixed(1)}%`;
        document.getElementById("testAcc").textContent = `${(stats.test_accuracy * 100).toFixed(1)}%`;
        document.getElementById("baselineAcc").textContent = `${(stats.baseline_accuracy * 100).toFixed(1)}%`;
        document.getElementById("vocabSize").textContent = stats.vocab_size;
        document.getElementById("confusion").textContent = JSON.stringify(stats.confusion_matrix, null, 2);
        renderDistribution(stats.tag_distribution);
      }

      document.getElementById("trainBtn").addEventListener("click", async () => {
        try {
          const stats = await callApi("/train", { method: "POST", body: JSON.stringify({ iterations: 10 }) });
          renderStats(stats);
          alert("训练完成");
        } catch (error) {
          alert(error.message);
        }
      });

      document.getElementById("loadStatsBtn").addEventListener("click", async () => {
        try {
          const stats = await callApi("/stats");
          renderStats(stats);
        } catch (error) {
          alert(error.message);
        }
      });

      document.getElementById("predictBtn").addEventListener("click", async () => {
        try {
          const payload = await callApi("/predict", {
            method: "POST",
            body: JSON.stringify({
              text: document.getElementById("inputText").value,
              tokenizer: document.getElementById("tokenizer").value,
            }),
          });
          renderPrediction(payload.tokens || []);
        } catch (error) {
          alert(error.message);
        }
      });
    </script>
  </body>
</html>
